<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Golf Blog Tracker</title>

<!-- ===== PWA / iOS Home Screen ===== -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Golf Blog">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1B2E22">
<meta name="description" content="ゴルフブログ投稿トラッカー — 毎日の記事記録＆XP管理">

<!-- Apple Touch Icon (SVG inline as data URI) -->
<link rel="apple-touch-icon" href="data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='112' fill='%231B2E22'/%3E%3Crect x='248' y='110' width='12' height='280' rx='6' fill='%2352B788'/%3E%3Cpolygon points='260,110 360,158 260,206' fill='%23E9C46A'/%3E%3Cellipse cx='254' cy='390' rx='90' ry='16' fill='%232D6A4F'/%3E%3Ccircle cx='210' cy='378' r='24' fill='white' opacity='0.92'/%3E%3Ccircle cx='203' cy='372' r='3.5' fill='%23ccc'/%3E%3Ccircle cx='217' cy='370' r='3.5' fill='%23ccc'/%3E%3Ccircle cx='210' cy='382' r='3.5' fill='%23ccc'/%3E%3C/svg%3E">

<!-- Manifest set dynamically below -->
<link rel="manifest" id="manifestLink">

<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #2D6A4F;
    --green-light: #52B788;
    --green-pale: #D8F3DC;
    --gold: #E9C46A;
    --gold-dark: #C9A227;
    --coral: #E76F51;
    --sky: #90E0EF;
    --dark: #1B2E22;
    --mid: #2D4A38;
    --text: #F4F9F4;
    --text-muted: #8DB89B;
    --card: #243B2E;
    --card2: #1E3329;
    /* iOS safe area insets */
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    background: var(--dark);
    color: var(--text);
    min-height: 100vh;
    min-height: -webkit-fill-available;
    overflow-x: hidden;
    /* push content below status bar on iPhone */
    padding-top: var(--safe-top);
  }
  /* BG pattern */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      radial-gradient(circle at 20% 20%, rgba(82,183,136,0.07) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(233,196,106,0.05) 0%, transparent 50%);
    pointer-events: none; z-index: 0;
  }
  .app { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; padding: 0 0 calc(100px + var(--safe-bottom)); }
  /* Header */
  .header {
    padding: 28px 20px 16px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .logo {
    font-size: 11px; font-weight: 700; letter-spacing: 0.15em;
    color: var(--green-light); text-transform: uppercase;
    font-family: 'DM Mono', monospace;
  }
  .streak-pill {
    display: flex; align-items: center; gap: 6px;
    background: var(--card); border: 1px solid var(--gold-dark);
    border-radius: 20px; padding: 6px 14px;
    font-family: 'DM Mono', monospace; font-size: 13px;
    color: var(--gold); font-weight: 500;
    cursor: pointer; transition: all 0.2s;
  }
  .streak-pill:hover { background: var(--mid); }
  .streak-fire { font-size: 16px; }
  /* XP bar */
  .xp-section { padding: 0 20px 20px; }
  .xp-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .xp-label { font-size: 11px; color: var(--text-muted); font-family: 'DM Mono', monospace; letter-spacing: 0.1em; }
  .xp-val { font-size: 11px; color: var(--green-light); font-family: 'DM Mono', monospace; font-weight: 500; }
  .xp-bar-bg {
    height: 8px; background: var(--card2); border-radius: 4px; overflow: hidden;
  }
  .xp-bar-fill {
    height: 100%; border-radius: 4px;
    background: linear-gradient(90deg, var(--green-light), var(--gold));
    transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  /* Today's mission card */
  .section-label {
    font-size: 10px; font-weight: 700; letter-spacing: 0.2em; color: var(--text-muted);
    text-transform: uppercase; font-family: 'DM Mono', monospace;
    padding: 0 20px; margin-bottom: 10px;
  }
  .mission-card {
    margin: 0 16px 20px;
    background: var(--card);
    border: 1px solid rgba(82,183,136,0.2);
    border-radius: 20px; padding: 24px;
    position: relative; overflow: hidden;
  }
  .mission-card::before {
    content: '⛳';
    position: absolute; right: 20px; top: 20px;
    font-size: 40px; opacity: 0.12;
  }
  .mission-title { font-size: 18px; font-weight: 900; margin-bottom: 6px; line-height: 1.3; }
  .mission-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; line-height: 1.5; }
  .mission-tasks { display: flex; flex-direction: column; gap: 10px; }
  .task-item {
    display: flex; align-items: center; gap: 12px;
    background: var(--card2); border-radius: 12px; padding: 12px 14px;
    cursor: pointer; transition: all 0.2s; border: 1.5px solid transparent;
    user-select: none; -webkit-tap-highlight-color: transparent;
  }
  .task-item:active { opacity: 0.8; transform: scale(0.98); }
  .task-item:hover { border-color: rgba(82,183,136,0.3); }
  .task-item.done { border-color: var(--green-light); background: rgba(82,183,136,0.08); }
  .task-check {
    width: 24px; height: 24px; border-radius: 50%;
    border: 2px solid var(--text-muted); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; transition: all 0.3s;
  }
  .task-item.done .task-check { background: var(--green-light); border-color: var(--green-light); }
  .task-text { font-size: 14px; flex: 1; }
  .task-item.done .task-text { color: var(--text-muted); text-decoration: line-through; }
  .task-xp {
    font-size: 11px; font-family: 'DM Mono', monospace;
    color: var(--gold); font-weight: 500;
    background: rgba(233,196,106,0.1); border-radius: 6px; padding: 2px 7px;
  }
  /* Weekly progress */
  .week-card {
    margin: 0 16px 20px;
    background: var(--card); border: 1px solid rgba(82,183,136,0.2);
    border-radius: 20px; padding: 20px 24px;
  }
  .week-title { font-size: 14px; font-weight: 700; margin-bottom: 16px; }
  .week-grid { display: flex; gap: 8px; }
  .day-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .day-label { font-size: 10px; color: var(--text-muted); font-family: 'DM Mono', monospace; }
  .day-dot {
    width: 36px; height: 36px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; transition: all 0.3s; cursor: pointer;
    border: 1.5px solid transparent;
  }
  .day-dot.empty { background: var(--card2); border-color: rgba(255,255,255,0.05); }
  .day-dot.done { background: var(--green-light); }
  .day-dot.partial { background: rgba(82,183,136,0.3); border-color: var(--green-light); }
  .day-dot.today { border-color: var(--gold); }
  .day-article { font-size: 9px; color: var(--text-muted); font-family: 'DM Mono', monospace; }
  /* Stats row */
  .stats-row { display: flex; gap: 10px; margin: 0 16px 20px; }
  .stat-card {
    flex: 1; background: var(--card);
    border: 1px solid rgba(82,183,136,0.15);
    border-radius: 16px; padding: 16px 14px; text-align: center;
  }
  .stat-num { font-size: 26px; font-weight: 900; line-height: 1; margin-bottom: 4px; }
  .stat-num.gold { color: var(--gold); }
  .stat-num.green { color: var(--green-light); }
  .stat-num.coral { color: var(--coral); }
  .stat-desc { font-size: 10px; color: var(--text-muted); font-family: 'DM Mono', monospace; line-height: 1.3; }
  /* Article log */
  .article-list { margin: 0 16px 20px; display: flex; flex-direction: column; gap: 8px; }
  .article-item {
    background: var(--card); border: 1px solid rgba(82,183,136,0.15);
    border-radius: 14px; padding: 14px 16px;
    display: flex; align-items: center; gap: 12px;
  }
  .article-num {
    font-size: 13px; font-weight: 700; font-family: 'DM Mono', monospace;
    color: var(--green-light); min-width: 32px;
  }
  .article-info { flex: 1; }
  .article-ttl { font-size: 13px; font-weight: 700; margin-bottom: 2px; }
  .article-date { font-size: 10px; color: var(--text-muted); font-family: 'DM Mono', monospace; }
  .article-badge {
    font-size: 10px; font-family: 'DM Mono', monospace;
    background: rgba(82,183,136,0.15); color: var(--green-light);
    border-radius: 6px; padding: 3px 8px;
  }
  /* Add article button — respects iPhone home bar */
  .add-btn {
    position: fixed;
    bottom: calc(24px + var(--safe-bottom));
    left: 50%; transform: translateX(-50%);
    background: linear-gradient(135deg, var(--green-light), var(--green));
    color: white; border: none; border-radius: 28px;
    padding: 16px 40px; font-size: 15px; font-weight: 700;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    cursor: pointer; box-shadow: 0 8px 32px rgba(82,183,136,0.35);
    transition: all 0.2s; z-index: 100;
    letter-spacing: 0.05em;
    -webkit-tap-highlight-color: transparent;
  }
  .add-btn:hover { transform: translateX(-50%) translateY(-2px); box-shadow: 0 12px 40px rgba(82,183,136,0.45); }
  .add-btn:active { transform: translateX(-50%) scale(0.97); }
  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.75);
    display: flex; align-items: flex-end; justify-content: center;
    z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.25s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--mid); border-radius: 28px 28px 0 0;
    padding: 28px 24px calc(40px + var(--safe-bottom)); width: 100%; max-width: 480px;
    transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    border-top: 1px solid rgba(82,183,136,0.2);
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-handle {
    width: 36px; height: 4px; border-radius: 2px;
    background: rgba(255,255,255,0.15); margin: 0 auto 20px;
  }
  .modal-title { font-size: 18px; font-weight: 900; margin-bottom: 20px; }
  .form-group { margin-bottom: 16px; }
  .form-label { font-size: 11px; color: var(--text-muted); font-family: 'DM Mono', monospace; letter-spacing: 0.1em; margin-bottom: 8px; display: block; }
  .form-input {
    width: 100%; background: var(--card2); border: 1.5px solid rgba(82,183,136,0.2);
    border-radius: 12px; padding: 12px 14px; color: var(--text);
    font-family: 'Zen Kaku Gothic New', sans-serif; font-size: 16px; /* 16px prevents iOS zoom */
    outline: none; transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  .form-input:focus { border-color: var(--green-light); }
  .form-input::placeholder { color: var(--text-muted); opacity: 0.6; }
  .tag-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .tag-btn {
    background: var(--card2); border: 1.5px solid rgba(82,183,136,0.2);
    border-radius: 20px; padding: 7px 16px; font-size: 12px;
    color: var(--text-muted); cursor: pointer; transition: all 0.2s;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    -webkit-tap-highlight-color: transparent;
  }
  .tag-btn.active { background: rgba(82,183,136,0.2); border-color: var(--green-light); color: var(--green-light); font-weight: 700; }
  .submit-btn {
    width: 100%; background: linear-gradient(135deg, var(--green-light), var(--green));
    color: white; border: none; border-radius: 16px; padding: 16px;
    font-size: 15px; font-weight: 700; font-family: 'Zen Kaku Gothic New', sans-serif;
    cursor: pointer; margin-top: 8px; letter-spacing: 0.05em;
    transition: opacity 0.2s; -webkit-tap-highlight-color: transparent;
  }
  .submit-btn:active { opacity: 0.85; transform: scale(0.99); }
  /* Toast */
  .toast {
    position: fixed; top: calc(24px + var(--safe-top)); left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: var(--green-light); color: var(--dark);
    border-radius: 20px; padding: 12px 24px; font-weight: 700; font-size: 14px;
    z-index: 300; transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    white-space: nowrap; pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  /* Level badge */
  .level-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(233,196,106,0.12); border: 1px solid var(--gold-dark);
    border-radius: 20px; padding: 4px 12px;
    font-family: 'DM Mono', monospace; font-size: 11px; color: var(--gold);
    margin-top: 4px;
  }
  /* Install banner (shown only in browser, not in standalone) */
  .install-banner {
    margin: 0 16px 16px;
    background: linear-gradient(135deg, rgba(82,183,136,0.15), rgba(233,196,106,0.08));
    border: 1px solid rgba(82,183,136,0.3);
    border-radius: 16px; padding: 14px 16px;
    display: flex; align-items: center; gap: 12px;
    cursor: pointer;
  }
  .install-banner-icon { font-size: 28px; flex-shrink: 0; }
  .install-banner-text { flex: 1; }
  .install-banner-title { font-size: 13px; font-weight: 700; margin-bottom: 2px; }
  .install-banner-sub { font-size: 11px; color: var(--text-muted); line-height: 1.4; }
  .install-banner-close {
    font-size: 18px; color: var(--text-muted);
    background: none; border: none; cursor: pointer; padding: 4px;
    -webkit-tap-highlight-color: transparent;
  }
  /* Hide install banner in standalone (already installed) */
  @media (display-mode: standalone) {
    .install-banner { display: none !important; }
  }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.15)} }
  .pulse { animation: pulse 0.4s ease; }
</style>
</head>
<body>
<div class="app">
  <!-- Header -->
  <div class="header">
    <div>
      <div class="logo">⛳ Golf Blog</div>
      <div class="level-badge" id="levelBadge">🏅 Lv.1 ビギナー</div>
    </div>
    <div class="streak-pill" id="streakPill">
      <span class="streak-fire">🔥</span>
      <span id="streakNum">0</span>日連続
    </div>
  </div>

  <!-- XP bar -->
  <div class="xp-section">
    <div class="xp-row">
      <span class="xp-label">TODAY'S XP</span>
      <span class="xp-val" id="xpVal">0 / 100 XP</span>
    </div>
    <div class="xp-bar-bg"><div class="xp-bar-fill" id="xpBar" style="width:0%"></div></div>
  </div>

  <!-- iOS Install Banner (hidden when already installed as PWA) -->
  <div class="install-banner" id="installBanner">
    <div class="install-banner-icon">📲</div>
    <div class="install-banner-text">
      <div class="install-banner-title">ホーム画面に追加しよう！</div>
      <div class="install-banner-sub">Safari の「共有」→「ホーム画面に追加」でアプリとして使えます</div>
    </div>
    <button class="install-banner-close" onclick="dismissBanner()">✕</button>
  </div>

  <!-- Today's mission -->
  <div class="section-label">TODAY'S MISSION</div>
  <div class="mission-card">
    <div class="mission-title">今日のゴルフミッション</div>
    <div class="mission-sub" id="missionDate">読み込み中...</div>
    <div class="mission-tasks" id="taskList"></div>
  </div>

  <!-- Weekly progress -->
  <div class="section-label">THIS WEEK</div>
  <div class="week-card">
    <div class="week-title">今週の投稿 <span id="weekCount" style="color:var(--green-light)">0</span>/2</div>
    <div class="week-grid" id="weekGrid"></div>
  </div>

  <!-- Stats -->
  <div class="section-label">STATS</div>
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-num gold" id="totalArticles">0</div>
      <div class="stat-desc">総投稿数</div>
    </div>
    <div class="stat-card">
      <div class="stat-num green" id="totalXP">0</div>
      <div class="stat-desc">累計 XP</div>
    </div>
    <div class="stat-card">
      <div class="stat-num coral" id="maxStreak">0</div>
      <div class="stat-desc">最長連続🔥</div>
    </div>
  </div>

  <!-- Article log -->
  <div class="section-label">ARTICLE LOG</div>
  <div class="article-list" id="articleLog"></div>
</div>

<!-- Add button -->
<button class="add-btn" onclick="openModal()">＋ 記事を記録する</button>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">✍️ 記事を記録</div>
    <div class="form-group">
      <label class="form-label">記事タイトル</label>
      <input class="form-input" id="articleTitle" placeholder="例：ゴルフ場でのスロープレー対策" />
    </div>
    <div class="form-group">
      <label class="form-label">カテゴリ</label>
      <div class="tag-row" id="tagRow">
        <button class="tag-btn active" data-tag="マナー">⛳ マナー</button>
        <button class="tag-btn" data-tag="ルール">📋 ルール</button>
        <button class="tag-btn" data-tag="コース攻略">🏌️ コース攻略</button>
        <button class="tag-btn" data-tag="カラダ">💪 カラダ</button>
        <button class="tag-btn" data-tag="道具">🎒 道具</button>
        <button class="tag-btn" data-tag="体験談">📖 体験談</button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">ひとことメモ（任意）</label>
      <input class="form-input" id="articleNote" placeholder="例：カラダ経験から書いた渾身の一本！" />
    </div>
    <button class="submit-btn" onclick="submitArticle()">🎉 投稿完了！ +50 XP</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ---- PWA: Inject Web App Manifest as Blob URL ----
(function() {
  const iconSvg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><rect width="512" height="512" rx="112" fill="#1B2E22"/><rect x="248" y="110" width="12" height="280" rx="6" fill="#52B788"/><polygon points="260,110 360,158 260,206" fill="#E9C46A"/><ellipse cx="254" cy="390" rx="90" ry="16" fill="#2D6A4F"/><circle cx="210" cy="378" r="24" fill="white" opacity="0.92"/><circle cx="203" cy="372" r="3.5" fill="#ccc"/><circle cx="217" cy="370" r="3.5" fill="#ccc"/><circle cx="210" cy="382" r="3.5" fill="#ccc"/></svg>`;
  const iconUrl = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(iconSvg);

  const manifest = {
    name: 'Golf Blog Tracker',
    short_name: 'Golf Blog',
    description: 'ゴルフブログ投稿トラッカー — 毎日の記事記録＆XP管理',
    start_url: '.',
    display: 'standalone',
    background_color: '#1B2E22',
    theme_color: '#1B2E22',
    orientation: 'portrait-primary',
    lang: 'ja',
    icons: [
      { src: iconUrl, sizes: '512x512', type: 'image/svg+xml', purpose: 'any maskable' }
    ]
  };
  try {
    const blob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
    const url = URL.createObjectURL(blob);
    document.getElementById('manifestLink').href = url;
  } catch(e) { /* ignore if blob URLs unsupported */ }
})();

// ---- State ----
const STATE_KEY = 'golfBlogTracker_v1';
const BANNER_KEY = 'golfBlogBannerDismissed';

function loadState() {
  try {
    const raw = localStorage.getItem(STATE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return {
    articles: [],
    tasks: {},
    streak: 0,
    lastActiveDate: null,
    totalXP: 0,
    maxStreak: 0
  };
}
function saveState() {
  try { localStorage.setItem(STATE_KEY, JSON.stringify(state)); } catch(e) {}
}
let state = loadState();

// ---- Install banner ----
function dismissBanner() {
  document.getElementById('installBanner').style.display = 'none';
  try { localStorage.setItem(BANNER_KEY, '1'); } catch(e) {}
}
// Hide if already dismissed or running as standalone
(function() {
  const isStandalone = window.navigator.standalone === true ||
    window.matchMedia('(display-mode: standalone)').matches;
  const dismissed = !!localStorage.getItem(BANNER_KEY);
  if (isStandalone || dismissed) {
    const el = document.getElementById('installBanner');
    if (el) el.style.display = 'none';
  }
})();

// ---- Date utils ----
function today() { return new Date().toISOString().slice(0,10); }
function weekDates() {
  const d = new Date();
  const dow = d.getDay();
  const mon = new Date(d); mon.setDate(d.getDate() - ((dow + 6) % 7));
  return Array.from({length:7}, (_,i) => {
    const dd = new Date(mon); dd.setDate(mon.getDate() + i);
    return dd.toISOString().slice(0,10);
  });
}
const DAY_LABELS = ['月','火','水','木','金','土','日'];

// ---- Tasks definition ----
const DAILY_TASKS = [
  { id: 'write30', text: '30分ライティングする', xp: 30 },
  { id: 'topic',   text: 'ネタを1つメモする',    xp: 15 },
  { id: 'golf',    text: 'ゴルフ・カラダ動かす', xp: 20 },
];

// ---- Streak logic ----
function updateStreak() {
  const t = today();
  if (state.lastActiveDate === t) return;
  const yesterday = new Date();
  yesterday.setDate(yesterday.getDate() - 1);
  const yStr = yesterday.toISOString().slice(0,10);
  if (state.lastActiveDate === yStr) {
    state.streak += 1;
  } else if (state.lastActiveDate !== t) {
    state.streak = 0;
  }
  state.maxStreak = Math.max(state.maxStreak, state.streak);
}

// ---- Level ----
function getLevel(xp) {
  if (xp < 100)  return { lv: 1, name: 'ビギナー',     icon: '🏅' };
  if (xp < 300)  return { lv: 2, name: 'ゴルファー',   icon: '⛳' };
  if (xp < 600)  return { lv: 3, name: 'キャラバン',   icon: '🏌️' };
  if (xp < 1000) return { lv: 4, name: 'エース',       icon: '🏆' };
  return            { lv: 5, name: 'レジェンド',    icon: '🌟' };
}

// ---- Render ----
function render() {
  const t = today();
  const todayTasks = state.tasks[t] || {};
  const d = new Date();
  document.getElementById('missionDate').textContent =
    `${d.getMonth()+1}月${d.getDate()}日（${['日','月','火','水','木','金','土'][d.getDay()]}）`;

  // Task list
  const taskEl = document.getElementById('taskList');
  taskEl.innerHTML = '';
  DAILY_TASKS.forEach(task => {
    const done = !!todayTasks[task.id];
    const div = document.createElement('div');
    div.className = 'task-item' + (done ? ' done' : '');
    div.innerHTML = `
      <div class="task-check">${done ? '✓' : ''}</div>
      <div class="task-text">${task.text}</div>
      <div class="task-xp">+${task.xp} XP</div>
    `;
    div.onclick = () => toggleTask(task);
    taskEl.appendChild(div);
  });

  // XP today
  const todayXP = DAILY_TASKS.reduce((s, tk) => s + (todayTasks[tk.id] ? tk.xp : 0), 0);
  const xpPct = Math.min(100, (todayXP / 100) * 100);
  document.getElementById('xpVal').textContent = `${todayXP} / 100 XP`;
  document.getElementById('xpBar').style.width = xpPct + '%';

  // Streak
  document.getElementById('streakNum').textContent = state.streak;

  // Level
  const lv = getLevel(state.totalXP);
  document.getElementById('levelBadge').textContent = `${lv.icon} Lv.${lv.lv} ${lv.name}`;

  // Stats
  document.getElementById('totalArticles').textContent = state.articles.length;
  document.getElementById('totalXP').textContent = state.totalXP;
  document.getElementById('maxStreak').textContent = state.maxStreak;

  // Week grid
  const wDates = weekDates();
  const weekGrid = document.getElementById('weekGrid');
  weekGrid.innerHTML = '';
  const weekArticles = state.articles.filter(a => wDates.includes(a.date));
  wDates.forEach((wd, i) => {
    const col = document.createElement('div');
    col.className = 'day-col';
    const arts = state.articles.filter(a => a.date === wd);
    const tasks2 = state.tasks[wd] || {};
    const taskDone = Object.keys(tasks2).length;
    const isToday = wd === t;
    let dotClass = 'empty';
    let dotIcon = '';
    if (arts.length > 0)      { dotClass = 'done';    dotIcon = '✓'; }
    else if (taskDone > 0)    { dotClass = 'partial'; dotIcon = '◑'; }
    if (isToday) dotClass += ' today';
    col.innerHTML = `
      <div class="day-label">${DAY_LABELS[i]}</div>
      <div class="day-dot ${dotClass}">${dotIcon}</div>
      <div class="day-article">${arts.length > 0 ? arts.length+'本' : ''}</div>
    `;
    weekGrid.appendChild(col);
  });
  document.getElementById('weekCount').textContent = weekArticles.length;

  // Article log
  const logEl = document.getElementById('articleLog');
  logEl.innerHTML = '';
  if (state.articles.length === 0) {
    logEl.innerHTML = '<div style="text-align:center;color:var(--text-muted);font-size:13px;padding:20px">まだ記事がありません。<br>最初の1本を記録しよう！</div>';
  } else {
    [...state.articles].reverse().slice(0, 10).forEach((a, i) => {
      const num = state.articles.length - i;
      const el = document.createElement('div');
      el.className = 'article-item';
      el.innerHTML = `
        <div class="article-num">#${String(num).padStart(2,'0')}</div>
        <div class="article-info">
          <div class="article-ttl">${a.title}</div>
          <div class="article-date">${a.date} · ${a.tag}</div>
        </div>
        <div class="article-badge">+50XP</div>
      `;
      logEl.appendChild(el);
    });
  }
}

// ---- Toggle task ----
function toggleTask(task) {
  const t = today();
  if (!state.tasks[t]) state.tasks[t] = {};
  const wasDone = !!state.tasks[t][task.id];
  state.tasks[t][task.id] = !wasDone;
  if (!wasDone) {
    state.totalXP += task.xp;
    state.lastActiveDate = t;
    updateStreak();
    showToast(`+${task.xp} XP ゲット！🎉`);
  } else {
    state.totalXP = Math.max(0, state.totalXP - task.xp);
  }
  saveState();
  render();
}

// ---- Modal ----
let selectedTag = 'マナー';
document.querySelectorAll('.tag-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedTag = btn.dataset.tag;
  });
});
function openModal() {
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('articleTitle').focus(), 400);
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}
function handleOverlayClick(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}
function submitArticle() {
  const title = document.getElementById('articleTitle').value.trim();
  if (!title) {
    document.getElementById('articleTitle').focus();
    document.getElementById('articleTitle').style.borderColor = 'var(--coral)';
    setTimeout(() => { document.getElementById('articleTitle').style.borderColor = ''; }, 1500);
    return;
  }
  const t = today();
  state.articles.push({ title, tag: selectedTag, date: t, xp: 50 });
  state.totalXP += 50;
  state.lastActiveDate = t;
  updateStreak();
  state.maxStreak = Math.max(state.maxStreak, state.streak);
  saveState();
  closeModal();
  document.getElementById('articleTitle').value = '';
  document.getElementById('articleNote').value = '';
  showToast('🎉 記事を記録！+50 XP！');
  render();
}

// ---- Toast ----
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// ---- Init ----
render();
</script>
</body>
</html>
